<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SIGNAGE PLAYER</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Noto Sans KR',sans-serif;cursor:none}
#player{width:100vw;height:100vh;position:relative;background:#000}

/* 화면 회전 */
body.rotate-90  #player{transform:rotate(90deg);transform-origin:center center;width:100vh;height:100vw;position:fixed;top:calc((100vh - 100vw)/2);left:calc((100vw - 100vh)/2)}
body.rotate-270 #player{transform:rotate(270deg);transform-origin:center center;width:100vh;height:100vw;position:fixed;top:calc((100vh - 100vw)/2);left:calc((100vw - 100vh)/2)}
body.rotate-180 #player{transform:rotate(180deg)}

/* 대기화면 */
#standby{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,#0d1e35 0%,#070b12 70%);color:#fff;gap:16px;position:relative;overflow:hidden}
#standby::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(0,170,255,.02) 60px,rgba(0,170,255,.02) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,170,255,.02) 60px,rgba(0,170,255,.02) 61px);pointer-events:none}
.standby-logo{font-size:18px;color:rgba(0,170,255,.7);font-family:monospace;letter-spacing:10px;text-transform:uppercase;margin-bottom:8px}
@keyframes pulse{0%,100%{opacity:1;text-shadow:0 0 20px rgba(0,170,255,.4)}50%{opacity:.7;text-shadow:0 0 40px rgba(0,170,255,.8)}}
.standby-time{font-size:100px;font-weight:200;font-family:monospace;letter-spacing:8px;color:#e8f4ff;line-height:1;animation:pulse 3s ease-in-out infinite;text-shadow:0 0 30px rgba(0,170,255,.3)}
.standby-date{font-size:20px;color:#7a9bbf;font-weight:300;letter-spacing:2px}
.standby-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,170,255,.4),transparent);margin:4px 0}
.standby-info{font-size:15px;color:#5a7a9a;margin-top:4px;font-family:monospace;text-align:center;line-height:2;letter-spacing:1px}



/* 미디어 플레이어 */
#img-player{display:none;width:100%;height:100%;object-fit:cover;background:#000;transition:opacity 0.35s ease}
#video-player{display:none;width:100%;height:100%;object-fit:cover;background:#000;transition:opacity 0.35s ease}
#iframe-player{display:none;width:100%;height:100%;border:none;background:#000}
#text-player{display:none;width:100%;height:100%;overflow:hidden;position:relative;align-items:center;justify-content:center;background:#000;transition:opacity 0.35s ease}

/* 진행바 */
#progress-bar{display:none}

/* HUD */
#hud{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.8);color:#00aaff;font-size:11px;font-family:monospace;padding:10px 14px;border-radius:6px;border:1px solid rgba(0,170,255,.3);z-index:200;line-height:2;opacity:0;transition:opacity .3s}
#hud.visible{opacity:1}

/* 알림 */
#offline-overlay{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,61,90,.9);color:#fff;font-family:monospace;font-size:13px;padding:8px 20px;border-radius:6px;z-index:300}
#offline-overlay.show{display:block}
#cmd-toast{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,170,255,.9);color:#000;font-family:monospace;font-size:13px;font-weight:700;padding:10px 24px;border-radius:6px;z-index:300}
</style>
</head>
<body>
<div id="player">
  <div id="standby">
    <div class="standby-logo">◈ SIGNAGE OS</div>
    <div class="standby-time" id="standby-time">00:00</div>
    <div class="standby-divider"></div>
    <div class="standby-date" id="standby-date"></div>
    <div class="standby-info" id="standby-info">연결 중...</div>
  </div>
  <img    id="img-player"    src="" alt=""/>
  <video  id="video-player"  autoplay muted playsinline disablepictureinpicture x5-playsinline webkit-playsinline></video>
  <iframe id="iframe-player" src="" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>
  <div id="text-player"></div>
  <div id="iframe-overlay" onclick="overlayClick()" style="display:none;position:fixed;inset:0;z-index:999;background:transparent;cursor:pointer"></div>
</div>

<div id="progress-bar"></div>
<div id="hud">
  <div>◈ SIGNAGE PLAYER v4.0</div>
  <div id="hud-store">매장: -</div>
  <div id="hud-screen">사이니지: -</div>
  <div id="hud-content">콘텐츠: -</div>
  <div id="hud-status">상태: 연결중</div>
  <div id="hud-screen-id" style="color:#3d5a7a;font-size:10px"></div>
</div>
<div id="offline-overlay">⚠ 서버 연결 끊김</div>
<div id="cmd-toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCB-Bw35hyiuIn__wjUQVqZ8hRdSVo9mKg",
  authDomain: "signage-all-in-one.firebaseapp.com",
  projectId: "signage-all-in-one",
  storageBucket: "signage-all-in-one.firebasestorage.app",
  messagingSenderId: "119443711079",
  appId: "1:119443711079:web:186401454f9c7e50f320c2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let SCREEN_ID = '';
let contentList=[], currentIdx=0, playTimer=null, isPlaying=false, isStandbyForced=false;
let baseStandbyInfo='';

// ── 시계 ──
function updateClock(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('standby-time').textContent=hh+':'+mm;
  document.getElementById('standby-date').textContent=now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+')';
}
setInterval(updateClock,1000);
updateClock();

// ── Screen ID 결정 ──
function getScreenIdFromUrl(){
  return new URLSearchParams(window.location.search).get('screen')||'';
}
async function resolveScreenId(){
  const urlId=getScreenIdFromUrl();
  if(urlId){localStorage.setItem('signage_screen_id',urlId);return urlId;}
  const saved=localStorage.getItem('signage_screen_id');
  if(saved)return saved;
  // 사이니지 없으면 첫번째 사이니지 자동 선택
  const snap=await db.collection('screens').get();
  if(!snap.empty){const id=snap.docs[0].id;localStorage.setItem('signage_screen_id',id);return id;}
  return null;
}

// ── 시간대 계산 (매장 timeslots 기반) ──
let storeTimeslots = []; // 매장에 설정된 시간대 배열
let storeOpenTime  = '';
let storeCloseTime = '';

function timeToMinutes(t) {
  if(!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getCurrentTimeSlot() {
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();

  // 총 운영시간 체크
  if (storeOpenTime && storeCloseTime) {
    const open  = timeToMinutes(storeOpenTime);
    const close = timeToMinutes(storeCloseTime);
    if (cur < open || cur >= close) return '__closed__'; // 운영시간 외
  }

  // 매장 시간대 체크
  for (const slot of storeTimeslots) {
    const start = timeToMinutes(slot.start);
    const end   = timeToMinutes(slot.end);
    if (cur >= start && cur < end) return slot.name;
  }

  return 'all'; // 상시
}

async function loadTimeslotConfig() {
  // 매장 정보에서 timeslots 로드 (startPlayer에서 호출)
}

// ── 시작 ──
async function startPlayer(){
  await loadTimeslotConfig();
  SCREEN_ID=await resolveScreenId();
  if(!SCREEN_ID){
    document.getElementById('standby-info').innerHTML='⚠ 사이니지 미등록<br/>관리자에서 매장 → 사이니지 추가 후<br/>URL복사 버튼을 눌러 접속하세요';
    return;
  }

  // 사이니지 + 매장 정보 로드
  try{
    document.getElementById('standby-info').textContent='Firebase 연결 중...';
    const scSnap=await db.collection('screens').doc(SCREEN_ID).get();
    if(!scSnap.exists){
      document.getElementById('standby-info').innerHTML='<span style="color:#ffc840">⚠ 사이니지 정보 없음</span><br/><small style="font-size:11px">ID: '+SCREEN_ID+'</small>';
      return;
    }
    const sc=scSnap.data();
    const storeSnap=await db.collection('stores').doc(sc.storeId).get();
    const storeName=storeSnap.exists?storeSnap.data().name:'';

    baseStandbyInfo='◈ '+storeName+' · '+sc.name+(sc.location?' ('+sc.location+')':'');
    document.getElementById('standby-info').textContent=baseStandbyInfo;
    document.getElementById('hud-store').textContent='매장: '+storeName;
    document.getElementById('hud-screen').textContent='사이니지: '+sc.name;
    document.getElementById('hud-screen-id').textContent='ID: '+SCREEN_ID;

    // 매장 운영시간/시간대 설정 로드
    if(storeSnap.exists) {
      const storeData = storeSnap.data();
      storeTimeslots  = storeData.timeslots  || [];
      storeOpenTime   = storeData.openTime   || '';
      storeCloseTime  = storeData.closeTime  || '';
    }

    // 화면 방향 적용
    applyRotation(sc.orientation||'landscape');
  }catch(e){
    console.error(e);
    document.getElementById('standby-info').innerHTML=
      '<span style="color:#ff3d5a">⚠ 연결 오류</span><br/>' +
      '<span style="font-size:11px;color:#7a9bbf">'+e.message+'</span>';
  }

  // 폴링 시작
  fetchPlaylist();
  fetchCommand();
  setInterval(fetchCommand,5000);
  setInterval(fetchPlaylist,30000);
  updateStatus();
  setInterval(updateStatus,60000);
}

// ── 명령 폴링 ──
async function fetchCommand(){
  try{
    const snap=await db.collection('commands').doc(SCREEN_ID).get();
    if(!snap.exists)return;
    const cmd=snap.data();
    if(!cmd||cmd.executed)return;
    handleCommand(cmd.type,cmd);
    await db.collection('commands').doc(SCREEN_ID).set(Object.assign({},cmd,{executed:true}));
  }catch(e){console.error('명령 폴링 오류:',e);}
}

// ── 플레이리스트 폴링 ──
// 시간대 추적
  let currentTimeSlot = '';

  async function fetchPlaylist(){
  try{
    const [pSnap,cSnap]=await Promise.all([
      db.collection('playlists').get(),
      db.collection('contents').get(),
    ]);
    const all=pSnap.docs.map(d=>Object.assign({id:d.id},d.data()));

    // 이 사이니지에 등록된 플레이리스트 전체
    const myPlaylists=all.filter(p=>p.screenId===SCREEN_ID);
    if(!myPlaylists.length){if(!isStandbyForced)showStandby();return;}

    // 현재 시간대에 맞는 플레이리스트 선택
    const slot=getCurrentTimeSlot();

    // 운영시간 외 → 대기화면
    if(slot==='__closed__'){
      if(!isStandbyForced){
        if(isPlaying){
          isPlaying=false;
          clearTimeout(playTimer);
          showStandby();
          showCmdToast('운영시간 종료 → 대기화면 전환');
        }
        // standby 화면에 운영시간 표시 (항상 덮어쓰기 — 중복 방지)
        document.getElementById('standby-info').innerHTML=
          baseStandbyInfo+
          (storeOpenTime||storeCloseTime ? '<br/><span style="color:var(--accent-yellow);font-size:13px">운영시간 외 · '+storeOpenTime+'~'+storeCloseTime+'</span>' : '<br/><span style="color:var(--accent-yellow);font-size:13px">운영시간 외</span>');
      }
      currentTimeSlot=slot;
      return;
    }

    const matched=myPlaylists.find(p=>p.schedule===slot)
                ||myPlaylists.find(p=>p.schedule==='all')
                ||myPlaylists[0];

    // 시간대 바뀌면 자동 전환
    if(slot!==currentTimeSlot && currentTimeSlot!==''){
      currentTimeSlot=slot;
      showCmdToast('시간대 전환 → '+slot+': '+matched.name);
      isPlaying=false;
      isStandbyForced=false;
      clearTimeout(playTimer);
      currentIdx=0;
    } else {
      currentTimeSlot=slot;
    }

    const allContents=cSnap.docs.map(d=>Object.assign({id:d.id},d.data()));
    const newList=(matched.contentIds||[]).map(cid=>allContents.find(c=>c.id===cid)).filter(Boolean);

    if(newList.length>0){
      contentList=newList;
      if(!isPlaying&&!isStandbyForced){currentIdx=0;playNext();}
    }else{if(!isStandbyForced)showStandby();}
  }catch(e){console.error('플레이리스트 오류:',e);}
}

// ── 명령 처리 ──
function handleCommand(type,cmd){
  cmd=cmd||{};
  showCmdToast('명령: '+type);
  if(type==='reload'){setTimeout(()=>location.reload(),1000);}
  else if(type==='restart'){isPlaying=false;isStandbyForced=false;clearTimeout(playTimer);currentIdx=0;setTimeout(()=>playNext(),1500);}
  else if(type==='standby'){isPlaying=false;isStandbyForced=true;clearTimeout(playTimer);showStandby();}
  else if(type==='playlist_update'){isPlaying=false;isStandbyForced=false;clearTimeout(playTimer);currentIdx=0;setTimeout(()=>fetchPlaylist(),500);}
  else if(type==='orientation'){applyRotation(cmd.orientation||'landscape');}
}

// ── 재생 ──
function playNext(){
  if(!contentList.length){showStandby();return;}
  const c=contentList[currentIdx];
  currentIdx=(currentIdx+1)%contentList.length;
  document.getElementById('hud-content').textContent='콘텐츠: '+c.name;
  document.getElementById('hud-status').textContent='스케줄: '+(getCurrentTimeSlot()||'상시');
  fadeTransition(()=>playContent(c));
}

function playContent(c){
  hideAllPlayers();isPlaying=true;
  const duration=(c.duration||15)*1000;
  const type=c.type||'image';
  if(type==='image') playImage(c.url,duration);
  else if(type==='video'){
    const isYoutube=c.url&&(c.url.includes('youtube.com')||c.url.includes('youtu.be'));
    if(isYoutube) playIframe(convertYoutubeUrl(c.url),duration);
    else playVideo(c.url,duration);
  }
  else if(type==='signage'&&c.textConfig) playText(c.textConfig,duration);
  else playImage(c.url,duration);
  db.collection('screens').doc(SCREEN_ID).set({currentContent:c.name},{merge:true}).catch(()=>{});
}

// ── 공지 템플릿 렌더러 (player)
const PL_FONT="'Noto Sans KR','Apple SD Gothic Neo',sans-serif";
const PL_MONO="'SFMono-Regular',ui-monospace,monospace";
function plDot(s){return(s||'').replaceAll('-','.');}
function plTint(hex,alpha){const h=hex.replace('#','');const n=h.length===3?h.split('').map(c=>c+c).join(''):h;const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16);return `rgba(${r},${g},${b},${alpha})`;}
function plInfoRows(d){
  const rows=[];
  if(d.periodOn&&(d.start||d.end)){const p=d.start&&d.end?`${plDot(d.start)} ~ ${plDot(d.end)}`:plDot(d.start||d.end);rows.push({k:'기간',v:p});}
  if(d.hoursOn&&(d.open||d.close))rows.push({k:'시간',v:`${d.open||''} ~ ${d.close||''}`.trim()});
  if(d.daysOn){const sel=d.days.map((v,i)=>v?['월','화','수','목','금','토','일'][i]:null).filter(Boolean);if(sel.length){const w=sel.length===7?'매일':sel.length===5&&d.days.slice(0,5).every(Boolean)?'평일 (월–금)':sel.length===2&&d.days[5]&&d.days[6]?'주말 (토·일)':sel.join('·');rows.push({k:'요일',v:w});}}
  if(d.phoneOn&&d.phone)rows.push({k:'문의',v:d.phone});
  return rows;
}
function plBadge(d){return d.badgeOn&&d.badge&&d.badge.trim();}
function plKindEn(d){return d.kind==='이벤트'?'EVENT':'NOTICE';}
function plChip(rows,a,ic){const vc=ic||'inherit';return rows.map(r=>`<div style="display:flex;align-items:center;gap:22px"><span style="background:${a};color:#fff;font-size:32px;font-weight:700;padding:10px 26px;border-radius:999px;min-width:110px;text-align:center">${r.k}</span><span style="color:${vc};font-size:46px;font-weight:600">${r.v}</span></div>`).join('');}
function plDotInfo(rows,a,m,s,ic){return rows.map(r=>`<div style="display:flex;align-items:baseline;gap:24px"><span style="width:14px;height:14px;border-radius:999px;background:${a};transform:translateY(-6px);flex-shrink:0;display:inline-block"></span><span style="color:${ic||m};font-size:36px;font-weight:500;width:130px">${r.k}</span><span style="color:${ic||s};font-size:46px;font-weight:600">${r.v}</span></div>`).join('');}
function plLine(rows,m,s,div,ic){return rows.map((r,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:26px 4px;border-top:${i===0?'2px solid '+div:'none'};border-bottom:2px solid ${div}"><span style="color:${ic||m};font-size:38px;font-weight:600;letter-spacing:6px">${r.k}</span><span style="color:${ic||s};font-size:46px;font-weight:600">${r.v}</span></div>`).join('');}
function plSoft(rows,a,ic){return rows.map(r=>`<div style="background:${plTint(a,0.08)};border-radius:18px;padding:22px 36px;display:flex;align-items:center;justify-content:space-between"><span style="color:${a};font-size:36px;font-weight:700">${r.k}</span><span style="color:${ic||'inherit'};font-size:44px;font-weight:600">${r.v}</span></div>`).join('');}
const PL_SHELL=`width:1080px;height:1920px;position:relative;overflow:hidden;word-break:keep-all;font-family:${PL_FONT};box-sizing:border-box;flex-shrink:0`;

function plRenderClassic(d){const a=d.accent,rows=plInfoRows(d);return `<div style="${PL_SHELL};background:#fff;padding:120px 100px;display:flex;flex-direction:column;color:#111"><div style="display:flex;flex-direction:column;align-items:center;gap:22px"><div style="color:${a};font-size:30px;font-weight:700;letter-spacing:8px;font-family:${PL_MONO}">${plKindEn(d)}</div><div style="width:90px;height:8px;background:${a};border-radius:999px"></div><div style="font-size:48px;font-weight:700;letter-spacing:8px">${d.storeName||'상호명'}</div></div><div style="margin-top:90px;text-align:center"><div style="font-size:116px;font-weight:800;line-height:1.12;word-break:keep-all;color:${d.titleColor||'#111'}">${d.title||'타이틀'}</div></div>${plBadge(d)?`<div style="margin-top:56px;display:flex;justify-content:center"><span style="background:${a};color:#fff;font-size:52px;font-weight:800;padding:20px 56px;border-radius:999px">${d.badge}</span></div>`:''}<div style="margin-top:70px;text-align:center;flex:1"><div style="color:${d.contentColor||'#3a3f47'};font-size:56px;line-height:1.55;white-space:pre-wrap">${d.content||''}</div>${rows.length?`<div style="margin-top:80px;padding-top:70px;border-top:2px solid #ececec;display:flex;flex-direction:column;gap:24px;align-items:center">${plChip(rows,a,d.infoColor)}</div>`:''}</div><div style="display:flex;align-items:center;justify-content:center;margin-top:50px">${plLogoHtml(d,110,'#c9ccd2',false)}</div></div>`;}

function plLogoHtml(d, size, fallColor, dark){
  if(d&&d.logo){
    return `<img src="${d.logo}" style="max-height:${size}px;max-width:${size*3.2}px;object-fit:contain;display:block" />`;
  }
  const op = dark ? 0.5 : 0.65;
  return `<div style="height:${size}px;min-width:${size*2.2}px;padding:0 40px;border:3px dashed ${fallColor};border-radius:14px;display:flex;align-items:center;justify-content:center;color:${fallColor};font-size:34px;font-weight:600;letter-spacing:4px;opacity:${op}">LOGO</div>`;
}

const PL_RENDERERS={classic:plRenderClassic,banner:plRenderBanner,dark:plRenderDark,pop:plRenderPop,soft:plRenderSoft,editorial:plRenderEditorial,neon:plRenderClassic,gradient:plRenderBanner,split:plRenderSplit,timetable:plRenderDark,minimal:plRenderMinimal,retro:plRenderClassic,sports:plRenderSports,cafe:plRenderCafe,cinematic:plRenderCinematic,mono:plRenderMono,night:plRenderNight,sale:plRenderSale,welcome:plRenderWelcome,stripe:plRenderStripe,gallery:plRenderGallery,notice:plRenderClassic};

function playText(tc,duration){
  const el=document.getElementById('text-player');
  document.getElementById('standby').style.display='none';

  el.style.display='flex';
  el.style.alignItems='center';
  el.style.justifyContent='center';

  let html='';
  if(tc&&tc.tplId&&tc.sgData){
    const fn=PL_RENDERERS[tc.tplId]||plRenderClassic;
    html=fn(tc.sgData);
  }else{
    html='<div style="color:#fff;font-size:72px;font-weight:700;text-align:center;margin:auto">'+((tc&&tc.body)||'')+'</div>';
  }

  const W=1080, H=1920;
  const sw=el.clientWidth||window.innerWidth;
  const sh=el.clientHeight||window.innerHeight;
  const scale=Math.min(sw/W, sh/H);
  const tx=Math.round((sw-W*scale)/2);
  const ty=Math.round((sh-H*scale)/2);

  el.innerHTML=`<div style="width:${W}px;height:${H}px;transform:scale(${scale});transform-origin:top left;position:absolute;top:${ty}px;left:${tx}px">${html}</div>`;
  playTimer=setTimeout(()=>playNext(),duration);
}

// 화면 크기 변경 시 재조정
window.addEventListener('resize',()=>{
  const el=document.getElementById('text-player');
  if(el.style.display==='flex'){
    const inner=el.querySelector('[style*="transform:scale"]');
    if(!inner)return;
    const W=1080,H=1920;
    const sw=el.clientWidth||window.innerWidth;
    const sh=el.clientHeight||window.innerHeight;
    const scale=Math.min(sw/W,sh/H);
    const tx=Math.round((sw-W*scale)/2);
    const ty=Math.round((sh-H*scale)/2);
    inner.style.transform=`scale(${scale})`;
    inner.style.top=ty+'px';
    inner.style.left=tx+'px';
  }
});
function playImage(url,duration){
  const el=document.getElementById('img-player');
  el.src=url;el.style.display='block';
  document.getElementById('standby').style.display='none';
  playTimer=setTimeout(()=>playNext(),duration);
}
function playVideo(url,duration){
  const el=document.getElementById('video-player');
  el.src=url;
  el.style.display='block';
  el.style.opacity='0';
  document.getElementById('standby').style.display='none';

  // 안드로이드 오버레이 방지: ended 이벤트 발생 직전에 다음 콘텐츠로 전환
  el.onloadedmetadata=function(){
    el.style.opacity='1';
    // 영상 실제 길이와 설정 duration 중 짧은 것 사용
    // 영상 끝나기 0.5초 전에 전환 (안드로이드 재생버튼 오버레이 방지)
    const videoDuration = el.duration ? Math.max((el.duration-0.5)*1000, 500) : duration;
    const useDuration = Math.min(videoDuration, duration);
    clearTimeout(playTimer);
    playTimer=setTimeout(()=>playNext(), useDuration);
  };
  el.onended=function(){
    // ended 이벤트 발생 시 즉시 다음으로 (오버레이 뜨기 전에)
    clearTimeout(playTimer);
    playNext();
  };
  el.play().catch(()=>{});

  // fallback: loadedmetadata 안 오면 duration으로 처리
  playTimer=setTimeout(()=>playNext(), duration);
}
function playIframe(url,duration){
  const el=document.getElementById('iframe-player');
  el.allow='autoplay; fullscreen; encrypted-media; picture-in-picture';
  el.setAttribute('allowfullscreen','');
  el.src='';
  setTimeout(()=>{
    el.src=url;
    el.style.display='block';
    document.getElementById('standby').style.display='none';
    showIframeOverlay();
  },100);
  playTimer=setTimeout(()=>playNext(),duration);
}

function showIframeOverlay(){
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    document.getElementById('iframe-overlay').style.display='block';
  }
}

function overlayClick(){
  requestFullscreen();
  setTimeout(()=>{
    document.getElementById('iframe-overlay').style.display='none';
  },800);
}
function extractYoutubeId(url){
  if(!url) return '';
  const m1=url.match(/youtu\.be\/([^?&#/]+)/);
  if(m1) return m1[1];
  const m2=url.match(/[?&]v=([^?&#/]+)/);
  if(m2) return m2[1];
  const m3=url.match(/embed\/([^?&#/]+)/);
  if(m3) return m3[1];
  const m4=url.match(/shorts\/([^?&#/]+)/);
  if(m4) return m4[1];
  return '';
}

function convertYoutubeUrl(url){
  const vid = extractYoutubeId(url);
  if(!vid) return url;
  return 'https://www.youtube.com/embed/'+vid
    +'?autoplay=1&mute=1&loop=1&playlist='+vid
    +'&controls=0&rel=0&modestbranding=1';
}
function hideAllPlayers(){
  ['img-player','video-player','iframe-player','text-player'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display='none';
    el.style.opacity='1'; // opacity 초기화
    if(id==='video-player'){el.pause();el.src='';}
    if(id==='iframe-player') el.src='';
  });
  document.getElementById('iframe-overlay').style.display='none';
}
function showStandby(){
  isPlaying=false;hideAllPlayers();
  document.getElementById('standby').style.display='flex';
  document.getElementById('hud-status').textContent='상태: 대기중';
}

// ── 페이드 ──
const FADE_MS = 350;

function getVisiblePlayers(){
  return ['img-player','video-player','iframe-player','text-player']
    .map(id=>document.getElementById(id))
    .filter(el=>el&&el.style.display!=='none');
}

function fadeTransition(cb){
  const visibles = getVisiblePlayers();

  if(!visibles.length){
    // 현재 보이는 요소 없음 (첫 재생 등) → 그냥 실행
    cb();
    return;
  }

  // 1단계: 현재 보이는 요소들만 opacity:0 으로 fade out
  visibles.forEach(el=>{ el.style.opacity='0'; });

  setTimeout(()=>{
    // 2단계: 이전 요소 숨기고 새 콘텐츠 준비
    visibles.forEach(el=>{ el.style.opacity='1'; }); // transition 없이 reset
    cb(); // hideAllPlayers() + 새 playXxx() 호출

    // 3단계: 새로 보여진 요소를 opacity:0에서 1로 fade in
    const newVisibles = getVisiblePlayers();
    newVisibles.forEach(el=>{
      el.style.opacity='0';
    });
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        newVisibles.forEach(el=>{ el.style.opacity='1'; });
      });
    });
  }, FADE_MS);
}

// ── 화면 회전 ──
function applyRotation(orientation){
  document.body.classList.remove('rotate-90','rotate-180','rotate-270');
  if(orientation==='portrait-left')  document.body.classList.add('rotate-90');
  if(orientation==='portrait-right') document.body.classList.add('rotate-270');
  if(orientation==='flip')           document.body.classList.add('rotate-180');
  localStorage.setItem('signage_orientation',orientation||'landscape');
}
const savedOrientation=localStorage.getItem('signage_orientation');
if(savedOrientation)applyRotation(savedOrientation);

// ── 전체화면 ──
function requestFullscreen(){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen)el.mozRequestFullScreen();
}
window.addEventListener('load',()=>setTimeout(requestFullscreen,1000));
document.addEventListener('click',()=>{
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)requestFullscreen();
});
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement){
    setTimeout(requestFullscreen,2000);
    // iframe 재생 중이면 다시 오버레이 표시
    const iframe=document.getElementById('iframe-player');
    if(iframe.style.display==='block') setTimeout(showIframeOverlay,2500);
  } else {
    document.getElementById('iframe-overlay').style.display='none';
  }
});
document.addEventListener('webkitfullscreenchange',()=>{
  if(!document.webkitFullscreenElement)setTimeout(requestFullscreen,2000);
});

// ── 상태 업데이트 ──
async function measurePing(){
  const start=Date.now();
  try{await db.collection('screens').doc(SCREEN_ID).get();return Date.now()-start;}
  catch(e){return -1;}
}
async function updateStatus(){
  if(!SCREEN_ID)return;
  try{
    const ping=await measurePing();
    await db.collection('screens').doc(SCREEN_ID).set({
      status:'online',lastSeen:new Date().toISOString(),network:ping,
    },{merge:true});
  }catch(e){console.error(e);}
}

// ── HUD 토글 (5번 탭) ──
let tapCount=0;
document.addEventListener('click',()=>{
  tapCount++;
  if(tapCount>=5){tapCount=0;document.getElementById('hud').classList.toggle('visible');}
});

// ── 온/오프라인 ──
window.addEventListener('offline',()=>document.getElementById('offline-overlay').classList.add('show'));
window.addEventListener('online', ()=>document.getElementById('offline-overlay').classList.remove('show'));

// ── visibility 변경 시 즉시 명령 확인 ──
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')fetchCommand();});
document.addEventListener('fullscreenchange',()=>setTimeout(fetchCommand,500));
document.addEventListener('webkitfullscreenchange',()=>setTimeout(fetchCommand,500));

function showCmdToast(msg){
  const el=document.getElementById('cmd-toast');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

startPlayer();
</script>
